services:
  postgres:
    image: postgres:16-alpine
    container_name: csda-postgres
    environment:
      POSTGRES_USER: csda
      POSTGRES_PASSWORD: csda
      POSTGRES_DB: csda
    ports:
      - "5432:5432"
    volumes:
      - csda_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U csda -d csda"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: csda-adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

volumes:
  csda_pgdata:
